<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 180" width="200" height="360">
  <defs>
    <linearGradient id="pineG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#338833"/><stop offset="100%" stop-color="#115511"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Trunk -->
    <rect x="44" y="145" width="12" height="30" rx="4" fill="#774422"/>
    <line x1="48" y1="145" x2="47" y2="172" stroke="#553311" stroke-width="1.5" opacity="0.5"/>
    <!-- Layers bottom to top, getting smaller -->
    <polygon points="50,145 10,115 90,115" fill="#1a5511"/>
    <polygon points="50,120 14,93 86,93"  fill="url(#pineG)"/>
    <polygon points="50,120 16,95 84,95"  fill="#1a5511" opacity="0.3"/>
    <polygon points="50,98  18,72 82,72"  fill="url(#pineG)"/>
    <polygon points="50,98  20,74 80,74"  fill="#1a5511" opacity="0.3"/>
    <polygon points="50,78  22,52 78,52"  fill="url(#pineG)"/>
    <polygon points="50,78  24,54 76,54"  fill="#1a5511" opacity="0.3"/>
    <polygon points="50,58  28,36 72,36"  fill="url(#pineG)"/>
    <polygon points="50,40  34,24 66,24"  fill="#225522"/>
    <!-- Snow tips -->
    <path d="M46,40 Q50,36 54,40" fill="#eef8ff" opacity="0.7"/>
    <path d="M42,58 Q50,53 58,58" fill="#eef8ff" opacity="0.5"/>
    <!-- Highlight -->
    <path d="M36,52 Q42,44 50,42" fill="none" stroke="#66cc55" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>