<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="240" height="320">
  <defs>
    <radialGradient id="canopy" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#55cc44"/><stop offset="60%" stop-color="#338822"/><stop offset="100%" stop-color="#1a5511"/>
    </radialGradient>
    <radialGradient id="canopy2" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#66dd55"/><stop offset="60%" stop-color="#449933"/><stop offset="100%" stop-color="#226616"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Trunk -->
    <path d="M50,155 Q46,120 48,100 Q50,85 60,80 Q70,85 72,100 Q74,120 70,155 Z" fill="#774422"/>
    <!-- Bark lines -->
    <path d="M52,155 Q50,120 52,95" fill="none" stroke="#553311" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M66,155 Q68,120 67,95" fill="none" stroke="#553311" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Root hints -->
    <path d="M50,150 Q40,152 34,158" fill="none" stroke="#664422" stroke-width="3" stroke-linecap="round"/>
    <path d="M70,150 Q80,152 86,158" fill="none" stroke="#664422" stroke-width="3" stroke-linecap="round"/>
    <!-- Back canopy blobs -->
    <ellipse cx="45" cy="72" rx="28" ry="24" fill="#226614"/>
    <ellipse cx="75" cy="68" rx="26" ry="22" fill="#1d5c10"/>
    <!-- Main canopy -->
    <ellipse cx="60" cy="55" rx="42" ry="38" fill="url(#canopy)"/>
    <ellipse cx="38" cy="62" rx="28" ry="24" fill="url(#canopy2)"/>
    <ellipse cx="80" cy="65" rx="26" ry="22" fill="url(#canopy)"/>
    <ellipse cx="60" cy="40" rx="32" ry="28" fill="url(#canopy2)"/>
    <!-- Highlight -->
    <path d="M40,30 Q60,22 78,34" fill="none" stroke="#88ee66" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>