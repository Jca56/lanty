<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 180" width="200" height="360">
  <defs>
    <radialGradient id="birchCanopy" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#99dd44"/><stop offset="100%" stop-color="#446622"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Trunk white birch -->
    <path d="M44,160 Q42,120 44,90 Q46,70 50,65 Q54,70 56,90 Q58,120 56,160 Z" fill="#eeeedd"/>
    <!-- Birch marks -->
    <g fill="#888877" opacity="0.6">
      <rect x="43" y="95"  width="14" height="3"  rx="1.5"/>
      <rect x="42" y="108" width="15" height="2.5" rx="1.2"/>
      <rect x="44" y="122" width="13" height="3"   rx="1.5"/>
      <rect x="43" y="136" width="14" height="2.5" rx="1.2"/>
      <rect x="44" y="148" width="12" height="2"   rx="1"/>
    </g>
    <!-- Trunk shading -->
    <path d="M55,160 Q57,120 55,88" fill="none" stroke="#ccccbb" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
    <!-- Roots -->
    <path d="M44,158 Q36,160 30,165" fill="none" stroke="#ccccbb" stroke-width="3" stroke-linecap="round"/>
    <path d="M56,158 Q64,160 70,165" fill="none" stroke="#ccccbb" stroke-width="3" stroke-linecap="round"/>
    <!-- Canopy wispy -->
    <ellipse cx="50" cy="52" rx="34" ry="28" fill="url(#birchCanopy)"/>
    <ellipse cx="34" cy="62" rx="22" ry="18" fill="#88cc44"/>
    <ellipse cx="66" cy="60" rx="22" ry="18" fill="#77bb33"/>
    <ellipse cx="50" cy="38" rx="26" ry="22" fill="#99dd44"/>
    <!-- Light dapple -->
    <path d="M34,36 Q50,28 64,38" fill="none" stroke="#ccee88" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>