<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="240" height="200">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Stems -->
    <path d="M25,98 Q22,82 24,68" fill="none" stroke="#338822" stroke-width="3" stroke-linecap="round"/>
    <path d="M60,98 Q58,78 60,62" fill="none" stroke="#338822" stroke-width="3" stroke-linecap="round"/>
    <path d="M95,98 Q98,82 96,68" fill="none" stroke="#338822" stroke-width="3" stroke-linecap="round"/>
    <path d="M42,98 Q44,86 40,74" fill="none" stroke="#226611" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M78,98 Q76,86 80,74" fill="none" stroke="#226611" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M24,82 Q14,76 12,68 Q18,65 24,73" fill="#44aa33"/>
    <path d="M60,80 Q70,74 72,66 Q66,63 60,71" fill="#338822"/>
    <!-- Small flowers - purple -->
    <g>
      <circle cx="40" cy="66" r="7" fill="#cc88ff"/>
      <circle cx="40" cy="66" r="4" fill="#ffee44"/>
      <g fill="#dd99ff" opacity="0.7">
        <ellipse cx="40" cy="60" rx="2.5" ry="5" /><ellipse cx="40" cy="60" rx="2.5" ry="5" transform="rotate(60,40,66)"/>
        <ellipse cx="40" cy="60" rx="2.5" ry="5" transform="rotate(120,40,66)"/>
      </g>
    </g>
    <!-- White daisies -->
    <g>
      <g fill="#fff" opacity="0.9">
        <ellipse cx="24" cy="61" rx="3.5" ry="7" transform="rotate(0,24,61)"/>
        <ellipse cx="24" cy="61" rx="3.5" ry="7" transform="rotate(60,24,61)"/>
        <ellipse cx="24" cy="61" rx="3.5" ry="7" transform="rotate(120,24,61)"/>
      </g>
      <circle cx="24" cy="61" r="5" fill="#ffcc00"/>
    </g>
    <!-- Pink flowers -->
    <g>
      <g fill="#ff88bb" opacity="0.9">
        <ellipse cx="60" cy="55" rx="4" ry="9" transform="rotate(0,60,55)"/>
        <ellipse cx="60" cy="55" rx="4" ry="9" transform="rotate(45,60,55)"/>
        <ellipse cx="60" cy="55" rx="4" ry="9" transform="rotate(90,60,55)"/>
        <ellipse cx="60" cy="55" rx="4" ry="9" transform="rotate(135,60,55)"/>
      </g>
      <circle cx="60" cy="55" r="6" fill="#ffdd44"/>
    </g>
    <!-- Orange flowers -->
    <g>
      <g fill="#ff9944" opacity="0.9">
        <ellipse cx="96" cy="60" rx="3.5" ry="8" transform="rotate(0,96,60)"/>
        <ellipse cx="96" cy="60" rx="3.5" ry="8" transform="rotate(60,96,60)"/>
        <ellipse cx="96" cy="60" rx="3.5" ry="8" transform="rotate(120,96,60)"/>
        <ellipse cx="96" cy="60" rx="3.5" ry="8" transform="rotate(180,96,60)"/>
      </g>
      <circle cx="96" cy="60" r="5" fill="#cc4400"/>
    </g>
    <!-- Tiny buds -->
    <ellipse cx="78" cy="66" rx="4" ry="6" fill="#cc88ff" opacity="0.8"/>
    <ellipse cx="78" cy="64" rx="3" ry="4" fill="#aa66dd" opacity="0.5"/>
  </g>
</svg>