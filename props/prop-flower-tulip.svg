      <stop offset="0%" stop-color="#ff6688"/><stop offset="100%" stop-color="#cc2244"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <g filter="url(#sh)">
