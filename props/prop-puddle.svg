<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="320" height="120">
  <defs>
    <radialGradient id="waterG" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#aaddff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5599cc" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>
  <g filter="url(#sh)">
    <ellipse cx="80" cy="38" rx="72" ry="20" fill="url(#waterG)"/>
    <!-- Reflection shimmer -->
    <path d="M40,34 Q60,30 80,34 Q100,38 120,34" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <path d="M55,40 Q70,37 85,40 Q100,43 110,40" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Ripple rings -->
    <ellipse cx="80" cy="38" rx="55" ry="14" fill="none" stroke="#88ccff" stroke-width="1" opacity="0.4"/>
    <ellipse cx="80" cy="38" rx="38" ry="9"  fill="none" stroke="#88ccff" stroke-width="1" opacity="0.3"/>
    <!-- Sky reflection dot -->
    <ellipse cx="65" cy="34" rx="8" ry="3" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>