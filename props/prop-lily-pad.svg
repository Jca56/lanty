<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="240" height="160">
  <defs>
    <radialGradient id="padG" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#55cc44"/><stop offset="100%" stop-color="#226611"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Water -->
    <ellipse cx="60" cy="58" rx="55" ry="18" fill="#3388aa" opacity="0.5"/>
    <!-- Big lily pad -->
    <path d="M60,58 Q20,54 15,42 Q18,22 38,18 Q58,12 78,22 Q98,32 98,48 Q94,62 74,64 Q67,66 60,58 Z" fill="url(#padG)"/>
    <!-- Notch cut out -->
    <path d="M60,58 Q56,48 58,38 Q60,30 62,38 Q64,48 60,58 Z" fill="#3388aa" opacity="0.4"/>
    <!-- Pad veins -->
    <g stroke="#338822" stroke-width="1.2" opacity="0.5" fill="none">
      <path d="M60,58 Q45,48 30,38"/><path d="M60,58 Q50,42 48,28"/>
      <path d="M60,58 Q62,40 68,26"/><path d="M60,58 Q72,48 84,38"/>
      <path d="M60,58 Q75,54 90,52"/>
    </g>
    <!-- Flower on pad -->
    <g>
      <g fill="#ffeecc" opacity="0.9">
        <ellipse cx="42" cy="32" rx="4" ry="9" transform="rotate(0,42,32)"/>
        <ellipse cx="42" cy="32" rx="4" ry="9" transform="rotate(45,42,32)"/>
        <ellipse cx="42" cy="32" rx="4" ry="9" transform="rotate(90,42,32)"/>
        <ellipse cx="42" cy="32" rx="4" ry="9" transform="rotate(135,42,32)"/>
      </g>
      <circle cx="42" cy="32" r="6" fill="#ffcc44"/>
      <circle cx="42" cy="32" r="3" fill="#ff9900"/>
    </g>
    <!-- Shine on pad -->
    <path d="M30,24 Q48,16 64,24" fill="none" stroke="#88ee66" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>