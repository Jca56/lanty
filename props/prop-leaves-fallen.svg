<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="320" height="160">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Scattered fallen leaves -->
    <!-- Orange leaf -->
    <path d="M20,40 Q10,28 18,18 Q28,10 36,22 Q44,34 32,42 Z" fill="#ff8833" transform="rotate(-15,28,30)"/>
    <path d="M20,40 Q28,28 34,22" fill="none" stroke="#cc5511" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
    <!-- Red leaf -->
    <path d="M65,35 Q55,22 62,12 Q72,6 78,18 Q84,30 72,38 Z" fill="#cc2222" transform="rotate(10,70,25)"/>
    <path d="M65,35 Q72,22 76,14" fill="none" stroke="#991111" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
    <!-- Yellow leaf -->
    <path d="M105,30 Q96,18 104,8 Q114,2 120,14 Q126,26 114,34 Z" fill="#ffcc22" transform="rotate(-8,112,20)"/>
    <path d="M105,30 Q112,18 118,10" fill="none" stroke="#cc9911" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
    <!-- Brown leaf curled -->
    <path d="M140,50 Q130,38 136,28 Q144,22 150,32 Q156,44 146,52 Z" fill="#885522" transform="rotate(20,143,38)"/>
    <!-- Small green leaf -->
    <path d="M45,62 Q38,54 44,48 Q52,44 56,52 Q60,60 52,64 Z" fill="#338822" transform="rotate(-25,49,56)"/>
    <path d="M45,62 Q50,54 54,50" fill="none" stroke="#226611" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <!-- Another orange -->
    <path d="M82,65 Q75,55 80,46 Q88,40 94,50 Q100,60 90,67 Z" fill="#ff6622" transform="rotate(12,86,56)"/>
    <!-- Stem lines -->
    <path d="M20,40 Q22,46 18,52" fill="none" stroke="#774422" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <path d="M140,50 Q144,56 140,60" fill="none" stroke="#553311" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>