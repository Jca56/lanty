<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="200" height="240">
  <defs>
    <radialGradient id="capGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff6644"/>
      <stop offset="50%" stop-color="#ee2200"/>
      <stop offset="100%" stop-color="#aa1100"/>
    </radialGradient>
    <radialGradient id="stemGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </radialGradient>
    <radialGradient id="spotGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eeddc8"/>
    </radialGradient>
    <radialGradient id="eyeWhite" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dddddd"/>
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="capGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff3300" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Stem — starts at y=72 to connect flush with cap bottom -->
    <path d="M30,82 Q26,112 34,118 L66,118 Q74,112 70,82 Q62,88 50,88 Q38,88 30,82 Z"
          fill="url(#stemGrad)" stroke="#c8b89a" stroke-width="1"/>
    <!-- Stem shading -->
    <path d="M31,85 Q29,105 33,117" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M69,85 Q71,105 67,117" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Cap — drawn AFTER stem so it overlaps and covers the seam -->
    <path d="M10,72 Q10,28 50,22 Q90,28 90,72 Q75,88 50,90 Q25,88 10,72 Z"
          fill="url(#capGrad)" filter="url(#capGlow)"/>

    <!-- Cap underside rim -->
    <path d="M10,72 Q25,82 50,84 Q75,82 90,72 Q75,88 50,90 Q25,88 10,72 Z"
          fill="#cc1100" opacity="0.4"/>

    <!-- White spots -->
    <circle cx="50" cy="45" r="10" fill="url(#spotGrad)"/>
    <circle cx="27" cy="60" r="7"  fill="url(#spotGrad)"/>
    <circle cx="73" cy="60" r="7"  fill="url(#spotGrad)"/>
    <circle cx="38" cy="32" r="5"  fill="url(#spotGrad)"/>
    <circle cx="65" cy="34" r="5"  fill="url(#spotGrad)"/>

    <!-- Cap highlight -->
    <path d="M35,30 Q50,24 62,32" fill="none" stroke="#ff9977" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Face on stem -->
  <ellipse cx="41" cy="100" rx="6" ry="6.5" fill="url(#eyeWhite)"/>
  <ellipse cx="59" cy="100" rx="6" ry="6.5" fill="url(#eyeWhite)"/>
  <!-- Pupils -->
  <circle cx="42" cy="101" r="3.5" fill="#1a0a00"/>
  <circle cx="60" cy="101" r="3.5" fill="#1a0a00"/>
  <!-- Eye shine -->
  <circle cx="43.5" cy="99.5" r="1.2" fill="#fff"/>
  <circle cx="61.5" cy="99.5" r="1.2" fill="#fff"/>
  <!-- Happy mouth -->
  <path d="M43,109 Q50,114 57,109" fill="none" stroke="#8a5a3a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="35" cy="105" rx="4" ry="2.5" fill="#ff8866" opacity="0.4"/>
  <ellipse cx="65" cy="105" rx="4" ry="2.5" fill="#ff8866" opacity="0.4"/>
</svg>
